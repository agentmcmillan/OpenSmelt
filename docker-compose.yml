services:
  # PostgreSQL with pgvector for Memento MCP
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: memento
      POSTGRES_USER: memento
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./memento-mcp/init-schema.sh:/docker-entrypoint-initdb.d/00-init.sh
      - ./memento-mcp/lib/memory/memory-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memento -d memento"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # Redis for Memento keyword indexing and session tracking
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  # Memento MCP - Shared memory server (Node.js)
  memento:
    build:
      context: ./memento-mcp
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PORT: "56332"
      MEMENTO_ACCESS_KEY: ${MEMENTO_ACCESS_KEY:?Set MEMENTO_ACCESS_KEY in .env}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: memento
      POSTGRES_USER: memento
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_MODEL: "text-embedding-3-small"
      SESSION_TTL_MINUTES: "120"
      LOG_DIR: /var/log/mcp
    volumes:
      - memento_logs:/var/log/mcp
    ports:
      - "127.0.0.1:56332:56332"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:56332/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512M

  # FastMCP - Custom tools server (Python)
  fastmcp-tools:
    build:
      context: ./fastmcp-tools
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      memento:
        condition: service_healthy
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8090"
      SIGNAL_API_URL: ${SIGNAL_API_URL:-}
      SIGNAL_BOT_NUMBER: ${SIGNAL_BOT_NUMBER:-}
      SIGNAL_RECIPIENT: ${SIGNAL_RECIPIENT:-}
      NAS_HOST: ${NAS_HOST:-}
      MEMENTO_URL: "http://memento:56332"
      MEMENTO_ACCESS_KEY: ${MEMENTO_ACCESS_KEY:?Set MEMENTO_ACCESS_KEY in .env}
    volumes:
      - fastmcp_data:/app/data
    ports:
      - "127.0.0.1:8091:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket; s=socket.create_connection(('localhost',8090),2); s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================
  # MCP Gateway — single-endpoint aggregation layer
  # ============================================================
  mcp-gateway:
    build:
      context: ./mcp-gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      memento:
        condition: service_healthy
      fastmcp-tools:
        condition: service_healthy
      github-mcp:
        condition: service_started
      signal-mcp:
        condition: service_started
      docker-mcp:
        condition: service_healthy
      ollama-mcp:
        condition: service_healthy
      ssh-mcp:
        condition: service_healthy
      rss-mcp:
        condition: service_healthy
      cloudflare-mcp:
        condition: service_started
    environment:
      GATEWAY_HOST: "0.0.0.0"
      GATEWAY_PORT: "9000"
      GATEWAY_VERSION: ${GATEWAY_VERSION:-1.2.0}
      MEMENTO_URL: "http://memento:56332"
      MEMENTO_ACCESS_KEY: ${MEMENTO_ACCESS_KEY:?Set MEMENTO_ACCESS_KEY in .env}
      NETWORK_TOOLS_URL: "http://fastmcp-tools:8090"
      CONTEXT7_URL: ${CONTEXT7_URL:-https://mcp.context7.com/mcp}
      GITHUB_MCP_URL: "http://github-mcp:3000"
      SIGNAL_MCP_URL: "http://signal-mcp:3000"
      DOCKER_MCP_URL: "http://docker-mcp:3000"
      OLLAMA_MCP_URL: "http://ollama-mcp:3000"
      CLOUDFLARE_MCP_URL: "http://cloudflare-mcp:3000"
      SSH_MCP_URL: "http://ssh-mcp:3000"
      RSS_MCP_URL: "http://rss-mcp:3000"
    ports:
      - "127.0.0.1:9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================
  # Stdio wrapper containers (supergateway: stdio → streamable HTTP)
  # ============================================================

  github-mcp:
    build:
      context: ./mcp-wrappers/github
    restart: unless-stopped
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_PERSONAL_ACCESS_TOKEN:?Set GITHUB_PERSONAL_ACCESS_TOKEN in .env}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health 2>/dev/null | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  signal-mcp:
    build:
      context: ./mcp-wrappers/signal
    restart: unless-stopped
    environment:
      SIGNAL_API_URL: ${SIGNAL_API_URL:-}
      SIGNAL_SENDER: ${SIGNAL_SENDER:-}
      SIGNAL_RECIPIENT: ${SIGNAL_RECIPIENT:-}
    volumes:
      - ${AI_SIGNALS_PATH:-./mcp-wrappers/signal/placeholder}:/app/signal-mcp:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health 2>/dev/null | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  docker-mcp:
    build:
      context: ./mcp-wrappers/docker
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  ollama-mcp:
    build:
      context: ./mcp-wrappers/ollama
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health 2>/dev/null | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  cloudflare-mcp:
    build:
      context: ./mcp-wrappers/cloudflare
    restart: unless-stopped
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health 2>/dev/null | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  ssh-mcp:
    build:
      context: ./mcp-wrappers/ssh
    restart: unless-stopped
    volumes:
      - ${SSH_KEYS_PATH:-./ssh-keys}:/home/node/.ssh:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health 2>/dev/null | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  rss-mcp:
    build:
      context: ./mcp-wrappers/rss
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health 2>/dev/null | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256M

  # Caddy reverse proxy (optional — for remote access with mTLS or Cloudflare Tunnel)
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      memento:
        condition: service_healthy
      fastmcp-tools:
        condition: service_healthy
      mcp-gateway:
        condition: service_healthy
    ports:
      - "8843:443"
      - "8880:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/client-certs:/etc/caddy/client-certs:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}

volumes:
  postgres_data:
  redis_data:
  memento_logs:
  fastmcp_data:
  caddy_data:
  caddy_config:
